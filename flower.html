<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Blossoming Flowers at Magical Night</title>
  <style>
    /*
      CSS Blossoming Flowers at Magical Night
      Inspired by Yup Nguyen · https://dribbble.com/shots/11096994-Virtual-Garden
      + Butterfly swarm system adapted from SB Madhav's portfolio
      Made with Pure CSS & JS ♥
    */
    *, *::after, *::before { padding:0; margin:0; box-sizing:border-box; }
    :root { --dark-color:#000; }
    html { height:100%; }
    body {
      display:flex; align-items:flex-end; justify-content:center;
      min-height:100vh; height:100%;
      background-color:var(--dark-color);
      overflow:hidden; perspective:1000px;
      touch-action:manipulation;
    }

    /* night sky */
    .night {
      position:fixed; left:50%; top:0; transform:translateX(-50%);
      width:100%; height:100%; filter:blur(0.1vmin);
      background-image:
        radial-gradient(ellipse at top,transparent 0%,var(--dark-color)),
        radial-gradient(ellipse at bottom,var(--dark-color),rgba(145,233,255,.2)),
        repeating-linear-gradient(220deg,#000 0px,#000 19px,transparent 19px,transparent 22px),
        repeating-linear-gradient(189deg,#000 0px,#000 19px,transparent 19px,transparent 22px),
        repeating-linear-gradient(148deg,#000 0px,#000 19px,transparent 19px,transparent 22px),
        linear-gradient(90deg,rgb(0,255,250),rgb(240,240,240));
    }

    /* hint overlay */
    .hint {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      font-family:monospace; font-size:clamp(.5rem,.85vw,.72rem);
      color:rgba(0,255,136,.35); letter-spacing:.12em;
      text-align:center; pointer-events:none; user-select:none; white-space:nowrap; z-index:2;
    }
    .hint span { display:block; margin-top:5px; font-size:.7em; opacity:.5; }

    /* ── flowers wrapper — bottom half of viewport ── */
    .flowers {
      position:relative;
      transform:scale(0.62);
      transform-origin:bottom center;
      margin-bottom:-4vh;
    }
    @media(max-width:900px){ .flowers{ transform:scale(.50); margin-bottom:-5vh; } }
    @media(max-width:600px){ .flowers{ transform:scale(.38); margin-bottom:-6vh; } }
    @media(max-width:400px){ .flowers{ transform:scale(.30); margin-bottom:-7vh; } }

    /* flower base */
    .flower { position:absolute; bottom:10vmin; transform-origin:bottom center; z-index:10; --fl-speed:.8s; }
    .flower--1 { animation:moving-flower-1 4s linear infinite; }
    .flower--1 .flower__line{ height:70vmin; animation-delay:.3s; }
    .flower--1 .flower__line__leaf--1{ animation:blooming-leaf-right var(--fl-speed) 1.6s backwards; }
    .flower--1 .flower__line__leaf--2{ animation:blooming-leaf-right var(--fl-speed) 1.4s backwards; }
    .flower--1 .flower__line__leaf--3{ animation:blooming-leaf-left  var(--fl-speed) 1.2s backwards; }
    .flower--1 .flower__line__leaf--4{ animation:blooming-leaf-left  var(--fl-speed) 1.0s backwards; }
    .flower--1 .flower__line__leaf--5{ animation:blooming-leaf-right var(--fl-speed) 1.8s backwards; }
    .flower--1 .flower__line__leaf--6{ animation:blooming-leaf-left  var(--fl-speed) 2.0s backwards; }
    .flower--2 { left:50%; transform:rotate(20deg); animation:moving-flower-2 4s linear infinite; }
    .flower--2 .flower__line{ height:60vmin; animation-delay:.6s; }
    .flower--2 .flower__line__leaf--1{ animation:blooming-leaf-right var(--fl-speed) 1.9s backwards; }
    .flower--2 .flower__line__leaf--2{ animation:blooming-leaf-right var(--fl-speed) 1.7s backwards; }
    .flower--2 .flower__line__leaf--3{ animation:blooming-leaf-left  var(--fl-speed) 1.5s backwards; }
    .flower--2 .flower__line__leaf--4{ animation:blooming-leaf-left  var(--fl-speed) 1.3s backwards; }
    .flower--3 { left:50%; transform:rotate(-15deg); animation:moving-flower-3 4s linear infinite; }
    .flower--3 .flower__line{ animation-delay:.9s; }
    .flower--3 .flower__line__leaf--1{ animation:blooming-leaf-right var(--fl-speed) 2.5s backwards; }
    .flower--3 .flower__line__leaf--2{ animation:blooming-leaf-right var(--fl-speed) 2.3s backwards; }
    .flower--3 .flower__line__leaf--3{ animation:blooming-leaf-left  var(--fl-speed) 2.1s backwards; }
    .flower--3 .flower__line__leaf--4{ animation:blooming-leaf-left  var(--fl-speed) 1.9s backwards; }

    .flower__leafs{ position:relative; animation:blooming-flower 2s backwards; }
    .flower__leafs--1{ animation-delay:1.1s; }
    .flower__leafs--2{ animation-delay:1.4s; }
    .flower__leafs--3{ animation-delay:1.7s; }
    .flower__leafs::after{
      content:""; position:absolute; left:0; top:0;
      transform:translate(-50%,-100%); width:8vmin; height:8vmin;
      background-color:#6bf0ff; filter:blur(10vmin);
    }
    .flower__leaf{
      position:absolute; bottom:0; left:50%; width:8vmin; height:11vmin;
      border-radius:51% 49% 47% 53%/44% 45% 55% 69%;
      background-color:#a7ffee; background-image:linear-gradient(to top,#54b8aa,#a7ffee);
      transform-origin:bottom center; opacity:.9; box-shadow:inset 0 0 2vmin rgba(255,255,255,.5);
    }
    .flower__leaf--1{ transform:translate(-10%,1%) rotateY(40deg) rotateX(-50deg); }
    .flower__leaf--2{ transform:translate(-50%,-4%) rotateX(40deg); }
    .flower__leaf--3{ transform:translate(-90%,0%) rotateY(45deg) rotateX(50deg); }
    .flower__leaf--4{
      width:8vmin; height:8vmin; transform-origin:bottom left;
      border-radius:4vmin 10vmin 4vmin 4vmin;
      transform:translate(0%,18%) rotateX(70deg) rotate(-43deg);
      background-image:linear-gradient(to top,#39c6d6,#a7ffee); z-index:1; opacity:.8;
    }
    .flower__white-circle{
      position:absolute; left:-3.5vmin; top:-3vmin;
      width:9vmin; height:4vmin; border-radius:50%; background-color:#fff;
    }
    .flower__white-circle::after{
      content:""; position:absolute; left:50%; top:45%;
      transform:translate(-50%,-50%); width:60%; height:60%; border-radius:inherit;
      background-image:
        repeating-linear-gradient(135deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
        repeating-linear-gradient(45deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
        repeating-linear-gradient(112.5deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
        repeating-linear-gradient(22.5deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
        linear-gradient(90deg,rgb(255,235,18),rgb(255,206,0));
    }
    .flower__line{
      height:55vmin; width:1.5vmin;
      background-image:
        linear-gradient(to left,rgba(0,0,0,.2),transparent,rgba(255,255,255,.2)),
        linear-gradient(to top,transparent 10%,#14757a,#39c6d6);
      box-shadow:inset 0 0 2px rgba(0,0,0,.5); animation:grow-flower-tree 4s backwards;
    }
    .flower__line__leaf{
      --w:7vmin; --h:calc(var(--w) + 2vmin);
      position:absolute; top:20%; left:90%;
      width:var(--w); height:var(--h);
      border-top-right-radius:var(--h); border-bottom-left-radius:var(--h);
      background-image:linear-gradient(to top,rgba(20,117,122,.4),#39c6d6);
    }
    .flower__line__leaf--1{ transform:rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--2{ top:45%; transform:rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--3,.flower__line__leaf--4,.flower__line__leaf--6{
      border-top-right-radius:0; border-bottom-left-radius:0;
      border-top-left-radius:var(--h); border-bottom-right-radius:var(--h);
      left:-460%; top:12%; transform:rotate(-70deg) rotateY(30deg);
    }
    .flower__line__leaf--4{ top:40%; }
    .flower__line__leaf--5{ top:0; transform-origin:left; transform:rotate(70deg) rotateY(30deg) scale(.6); }
    .flower__line__leaf--6{ top:-2%; left:-450%; transform-origin:right; transform:rotate(-70deg) rotateY(30deg) scale(.6); }

    .flower__light{
      position:absolute; bottom:0; width:1vmin; height:1vmin;
      background-color:rgb(255,251,0); border-radius:50%; filter:blur(.2vmin);
      animation:light-ans 4s linear infinite backwards;
    }
    .flower__light:nth-child(odd){ background-color:#23f0ff; }
    .flower__light--1{left:-2vmin;animation-delay:1.0s} .flower__light--2{left:3vmin;animation-delay:.5s}
    .flower__light--3{left:-6vmin;animation-delay:.3s}  .flower__light--4{left:6vmin;animation-delay:.9s}
    .flower__light--5{left:-1vmin;animation-delay:1.5s} .flower__light--6{left:-4vmin;animation-delay:3s}
    .flower__light--7{left:3vmin;animation-delay:2s}    .flower__light--8{left:-6vmin;animation-delay:3.5s}

    /* grass */
    .flower__grass{
      --c:#159faa; --line-w:1.5vmin;
      position:absolute; bottom:12vmin; left:-7vmin;
      display:flex; flex-direction:column; align-items:flex-end;
      z-index:20; transform-origin:bottom center; transform:rotate(-48deg) rotateY(40deg);
    }
    .flower__grass--1{ animation:moving-grass 2s linear infinite; }
    .flower__grass--2{ left:2vmin; bottom:10vmin; transform:scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg); opacity:.8; z-index:0; animation:moving-grass--2 1.5s linear infinite; }
    .flower__grass--top{ width:7vmin; height:10vmin; border-top-right-radius:100%; border-right:var(--line-w) solid var(--c); transform-origin:bottom center; transform:rotate(-2deg); }
    .flower__grass--bottom{ margin-top:-2px; width:var(--line-w); height:25vmin; background-image:linear-gradient(to top,transparent,var(--c)); }
    .flower__grass__leaf{
      --size:10vmin; position:absolute;
      width:calc(var(--size)*2.1); height:var(--size);
      border-top-left-radius:var(--size); border-top-right-radius:var(--size);
      background-image:linear-gradient(to top,transparent,transparent 30%,var(--c)); z-index:100;
    }
    .flower__grass__leaf--1{top:-6%;left:30%;--size:6vmin;transform:rotate(-20deg);animation:gg1 2s 2.6s backwards}
    .flower__grass__leaf--2{top:-5%;left:-110%;--size:6vmin;transform:rotate(10deg);animation:gg2 2s 2.4s linear backwards}
    .flower__grass__leaf--3{top:5%;left:60%;--size:8vmin;transform:rotate(-18deg) rotateX(-20deg);animation:gg3 2s 2.2s linear backwards}
    .flower__grass__leaf--4{top:6%;left:-135%;--size:8vmin;transform:rotate(2deg);animation:gg4 2s 2s linear backwards}
    .flower__grass__leaf--5{top:20%;left:60%;--size:10vmin;transform:rotate(-24deg) rotateX(-20deg);animation:gg5 2s 1.8s linear backwards}
    .flower__grass__leaf--6{top:22%;left:-180%;--size:10vmin;transform:rotate(10deg);animation:gg6 2s 1.6s linear backwards}
    .flower__grass__leaf--7{top:39%;left:70%;--size:10vmin;transform:rotate(-10deg);animation:gg7 2s 1.4s linear backwards}
    .flower__grass__leaf--8{top:40%;left:-215%;--size:11vmin;transform:rotate(10deg);animation:gg8 2s 1.2s linear backwards}
    @keyframes gg1{0%{transform-origin:bottom left;transform:rotate(-20deg) scale(0)}}
    @keyframes gg2{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}}
    @keyframes gg3{0%{transform-origin:bottom left;transform:rotate(-18deg) rotateX(-20deg) scale(0)}}
    @keyframes gg4{0%{transform-origin:bottom right;transform:rotate(2deg) scale(0)}}
    @keyframes gg5{0%{transform-origin:bottom left;transform:rotate(-24deg) rotateX(-20deg) scale(0)}}
    @keyframes gg6{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}}
    @keyframes gg7{0%{transform-origin:bottom left;transform:rotate(-10deg) scale(0)}}
    @keyframes gg8{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}}
    .flower__grass__overlay{ position:absolute; top:-10%; right:0; width:100%; height:100%; background-color:rgba(0,0,0,.6); filter:blur(1.5vmin); z-index:100; }

    /* g-long */
    .flower__g-long{
      --w:2vmin;--h:6vmin;--c:#159faa;
      position:absolute; bottom:10vmin; left:-3vmin;
      transform-origin:bottom center; transform:rotate(-30deg) rotateY(-20deg);
      display:flex; flex-direction:column; align-items:flex-end;
      animation:flower-g-long-ans 3s linear infinite;
    }
    @keyframes flower-g-long-ans{0%,100%{transform:rotate(-30deg) rotateY(-20deg)}50%{transform:rotate(-32deg) rotateY(-20deg)}}
    .flower__g-long__top{ top:calc(var(--h)*-1); width:calc(var(--w)+1vmin); height:var(--h); border-top-right-radius:100%; border-right:.7vmin solid var(--c); transform:translate(-.7vmin,1vmin); }
    .flower__g-long__bottom{ width:var(--w); height:50vmin; transform-origin:bottom center; background-image:linear-gradient(to top,transparent 30%,var(--c)); box-shadow:inset 0 0 2px rgba(0,0,0,.5); clip-path:polygon(35% 0,65% 1%,100% 100%,0% 100%); }

    /* g-right */
    .flower__g-right{ position:absolute; bottom:6vmin; left:-2vmin; transform-origin:bottom left; transform:rotate(20deg); }
    .flower__g-right .leaf{ width:30vmin; height:50vmin; border-top-left-radius:100%; border-left:2vmin solid #079097; background-image:linear-gradient(to bottom,transparent,var(--dark-color) 60%); -webkit-mask-image:linear-gradient(to top,transparent 30%,#079097 60%); }
    .flower__g-right--1{ animation:flower-g-right-ans 2.5s linear infinite; }
    .flower__g-right--2{ left:5vmin; transform:rotateY(-180deg); animation:flower-g-right-ans--2 3s linear infinite; }
    .flower__g-right--2 .leaf{ height:75vmin; filter:blur(.3vmin); opacity:.8; }
    @keyframes flower-g-right-ans{0%,100%{transform:rotate(20deg)}50%{transform:rotate(24deg) rotateX(-20deg)}}
    @keyframes flower-g-right-ans--2{0%,100%{transform:rotateY(-180deg) rotate(0deg) rotateX(-20deg)}50%{transform:rotateY(-180deg) rotate(6deg) rotateX(-20deg)}}

    /* g-front */
    .flower__g-front{ position:absolute; bottom:6vmin; left:2.5vmin; z-index:100; transform-origin:bottom center; transform:rotate(-28deg) rotateY(30deg) scale(1.04); animation:gfront-ans 2s linear infinite; }
    @keyframes gfront-ans{0%,100%{transform:rotate(-28deg) rotateY(30deg) scale(1.04)}50%{transform:rotate(-35deg) rotateY(40deg) scale(1.04)}}
    .flower__g-front__line{ width:.3vmin; height:20vmin; background-image:linear-gradient(to top,transparent,#079097,transparent 100%); position:relative; }
    .flower__g-front__leaf-wrapper{ position:absolute; top:0; left:0; transform-origin:bottom left; transform:rotate(10deg); }
    .flower__g-front__leaf-wrapper:nth-child(even){ left:0; transform:rotateY(-180deg) rotate(5deg); animation:gfl-left 1s ease-in backwards; }
    .flower__g-front__leaf-wrapper:nth-child(odd){ animation:gfl-right 1s ease-in backwards; }
    .flower__g-front__leaf-wrapper--1{top:-8vmin;transform:scale(.7);animation:gfl-right 1s 5.5s ease-in backwards!important}
    .flower__g-front__leaf-wrapper--2{top:-8vmin;transform:rotateY(-180deg) scale(.7)!important;animation:gfl-left2 1s 4.6s ease-in backwards!important}
    .flower__g-front__leaf-wrapper--3{top:-3vmin;animation:gfl-right 1s 4.6s ease-in backwards}
    .flower__g-front__leaf-wrapper--4{top:-3vmin;transform:rotateY(-180deg) scale(.9)!important;animation:gfl-left2 1s 4.6s ease-in backwards!important}
    .flower__g-front__leaf-wrapper--5,.flower__g-front__leaf-wrapper--6{top:2vmin}
    .flower__g-front__leaf-wrapper--7,.flower__g-front__leaf-wrapper--8{top:6.5vmin}
    .flower__g-front__leaf-wrapper--2{animation-delay:5.2s!important}
    .flower__g-front__leaf-wrapper--3{animation-delay:4.9s!important}
    .flower__g-front__leaf-wrapper--5{animation-delay:4.3s!important}
    .flower__g-front__leaf-wrapper--6{animation-delay:4.1s!important}
    .flower__g-front__leaf-wrapper--7{animation-delay:3.8s!important}
    .flower__g-front__leaf-wrapper--8{animation-delay:3.5s!important}
    @keyframes gfl-right{0%{transform:rotate(10deg) scale(0)}}
    @keyframes gfl-left{0%{transform:rotateY(-180deg) rotate(5deg) scale(0)}}
    @keyframes gfl-left2{0%{transform:rotateY(-180deg) scale(0)}}
    .flower__g-front__leaf{
      width:10vmin; height:10vmin; border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
      box-shadow:inset 0 2px 1vmin hsla(184,97%,58%,.2);
      background-image:linear-gradient(to bottom left,transparent,var(--dark-color)),linear-gradient(to bottom right,#159faa 50%,transparent 50%);
      -webkit-mask-image:linear-gradient(to bottom right,#159faa 50%,transparent 50%);
      mask-image:linear-gradient(to bottom right,#159faa 50%,transparent 50%);
    }

    /* g-fr */
    .flower__g-fr{ position:absolute; bottom:-4vmin; left:0; transform-origin:bottom left; z-index:10; animation:gfr-ans 2s linear infinite; }
    @keyframes gfr-ans{0%,100%{transform:rotate(2deg)}50%{transform:rotate(4deg)}}
    .flower__g-fr .leaf{ width:30vmin; height:50vmin; border-top-left-radius:100%; border-left:2vmin solid #079097; -webkit-mask-image:linear-gradient(to top,transparent 25%,#079097 50%); position:relative; z-index:1; }
    .flower__g-fr__leaf{
      position:absolute; top:0; left:0; width:10vmin; height:10vmin;
      border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
      box-shadow:inset 0 2px 1vmin hsla(184,97%,58%,.2);
      background-image:linear-gradient(to bottom left,transparent,var(--dark-color) 98%),linear-gradient(to bottom right,#23f0ff 45%,transparent 50%);
      -webkit-mask-image:linear-gradient(135deg,#159faa 40%,transparent 50%);
    }
    .flower__g-fr__leaf--1{left:20vmin;transform:rotate(45deg);animation:gfrl1 .5s 5.2s linear backwards}
    .flower__g-fr__leaf--2{left:12vmin;top:-7vmin;transform:rotate(25deg) rotateY(-180deg);animation:gfrl6 .5s 5s linear backwards}
    .flower__g-fr__leaf--3{left:15vmin;top:6vmin;transform:rotate(55deg);animation:gfrl5 .5s 4.8s linear backwards}
    .flower__g-fr__leaf--4{left:6vmin;top:-2vmin;transform:rotate(25deg) rotateY(-180deg);animation:gfrl6 .5s 4.6s linear backwards}
    .flower__g-fr__leaf--5{left:10vmin;top:14vmin;transform:rotate(55deg);animation:gfrl5 .5s 4.4s linear backwards}
    .flower__g-fr__leaf--6{left:0;top:6vmin;transform:rotate(25deg) rotateY(-180deg);animation:gfrl6 .5s 4.2s linear backwards}
    .flower__g-fr__leaf--7{left:5vmin;top:22vmin;transform:rotate(45deg);animation:gfrl7 .5s 4s linear backwards}
    .flower__g-fr__leaf--8{left:-4vmin;top:15vmin;transform:rotate(15deg) rotateY(-180deg);animation:gfrl8 .5s 3.8s linear backwards}
    @keyframes gfrl1{0%{transform-origin:left;transform:rotate(45deg) scale(0)}}
    @keyframes gfrl5{0%{transform-origin:left;transform:rotate(55deg) scale(0)}}
    @keyframes gfrl6{0%{transform-origin:right;transform:rotate(25deg) rotateY(-180deg) scale(0)}}
    @keyframes gfrl7{0%{transform-origin:left;transform:rotate(45deg) scale(0)}}
    @keyframes gfrl8{0%{transform-origin:right;transform:rotate(15deg) rotateY(-180deg) scale(0)}}

    /* long-g */
    .long-g{ position:absolute; bottom:25vmin; left:-42vmin; transform-origin:bottom left; }
    .long-g--1{bottom:0;transform:scale(.8) rotate(-5deg)}
    .long-g--1 .leaf{-webkit-mask-image:linear-gradient(to top,transparent 40%,#079097 80%)!important}
    .long-g--1 .leaf--1{--w:5vmin;--h:60vmin;left:-2vmin;transform:rotate(3deg) rotateY(-180deg)}
    .long-g--2,.long-g--3{bottom:-3vmin;left:-35vmin;transform-origin:center;transform:scale(.6) rotateX(60deg)}
    .long-g--2 .leaf,.long-g--3 .leaf{-webkit-mask-image:linear-gradient(to top,transparent 50%,#079097 80%)!important}
    .long-g--2 .leaf--1{left:-1vmin;transform:rotateY(-180deg)}
    .long-g--3{left:-17vmin;bottom:0}
    .long-g--3 .leaf{-webkit-mask-image:linear-gradient(to top,transparent 40%,#079097 80%)!important}
    .long-g--4{left:25vmin;bottom:-3vmin;transform-origin:center;transform:scale(.6) rotateX(60deg)}
    .long-g--4 .leaf{-webkit-mask-image:linear-gradient(to top,transparent 50%,#079097 80%)!important}
    .long-g--5{left:42vmin;bottom:0;transform:scale(.8) rotate(2deg)}
    .long-g--6{left:0;bottom:-20vmin;z-index:100;filter:blur(.3vmin);transform:scale(.8) rotate(2deg)}
    .long-g--7{left:35vmin;bottom:20vmin;z-index:-1;filter:blur(.3vmin);transform:scale(.6) rotate(2deg);opacity:.7}
    .long-g .leaf{
      --w:15vmin;--h:40vmin;--c:#1aaa15;
      position:absolute; bottom:0; width:var(--w); height:var(--h);
      border-top-left-radius:100%; border-left:2vmin solid var(--c);
      -webkit-mask-image:linear-gradient(to top,transparent 20%,var(--dark-color));
      transform-origin:bottom center;
    }
    .long-g .leaf--0{left:2vmin;animation:leaf-ans-1 4s linear infinite}
    .long-g .leaf--1{--w:5vmin;--h:60vmin;animation:leaf-ans-1 4s linear infinite}
    .long-g .leaf--2{--w:10vmin;--h:40vmin;left:-.5vmin;bottom:5vmin;transform-origin:bottom left;transform:rotateY(-180deg);animation:leaf-ans-2 3s linear infinite}
    .long-g .leaf--3{--w:5vmin;--h:30vmin;left:-1vmin;bottom:3.2vmin;transform-origin:bottom left;transform:rotate(-10deg) rotateY(-180deg);animation:leaf-ans-3 3s linear infinite}

    @keyframes leaf-ans-1{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(5deg) scale(1.1)}}
    @keyframes leaf-ans-2{0%,100%{transform:rotateY(-180deg) rotate(5deg)}50%{transform:rotateY(-180deg) rotate(0deg) scale(1.1)}}
    @keyframes leaf-ans-3{0%,100%{transform:rotate(-10deg) rotateY(-180deg)}50%{transform:rotate(-20deg) rotateY(-180deg)}}

    .grow-ans{ animation:grow-ans 2s var(--d) backwards; }
    @keyframes grow-ans{0%{transform:scale(0);opacity:0}}
    .growing-grass{ animation:growing-grass-ans 1s 2s backwards; }
    @keyframes growing-grass-ans{0%{transform:scale(0)}}

    /* core keyframes */
    @keyframes light-ans{0%{opacity:0;transform:translateY(0)}25%{opacity:1;transform:translateY(-5vmin) translateX(-2vmin)}50%{opacity:1;transform:translateY(-15vmin) translateX(2vmin);filter:blur(.2vmin)}75%{transform:translateY(-20vmin) translateX(-2vmin);filter:blur(.2vmin)}100%{transform:translateY(-30vmin);opacity:0;filter:blur(1vmin)}}
    @keyframes moving-flower-1{0%,100%{transform:rotate(2deg)}50%{transform:rotate(-2deg)}}
    @keyframes moving-flower-2{0%,100%{transform:rotate(18deg)}50%{transform:rotate(14deg)}}
    @keyframes moving-flower-3{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(-20deg) rotateY(-10deg)}}
    @keyframes blooming-leaf-right{0%{transform-origin:left;transform:rotate(70deg) rotateY(30deg) scale(0)}}
    @keyframes blooming-leaf-left{0%{transform-origin:right;transform:rotate(-70deg) rotateY(30deg) scale(0)}}
    @keyframes grow-flower-tree{0%{height:0;border-radius:1vmin}}

    @keyframes moving-grass{0%,100%{transform:rotate(-48deg) rotateY(40deg)}50%{transform:rotate(-50deg) rotateY(40deg)}}
    @keyframes moving-grass--2{0%,100%{transform:scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg)}50%{transform:scale(.5) rotate(79deg) rotateX(10deg) rotateY(-200deg)}}

    @keyframes flapL{0%{transform:rotateY(0deg) scaleY(1)}100%{transform:rotateY(60deg) scaleY(.85)}}

  <script>
    /* ── unlock animations after 1 s ──────────────────────── */
    window.onload = () => {
      const t = setTimeout(() => {
        document.body.classList.remove('not-loaded');
        clearTimeout(t);
      }, 1000);
    };

    /* ── butterfly swarm ─────────────────────────────────── */
    const isMobile = window.matchMedia('(pointer:coarse)').matches || window.innerWidth < 768;
    const SWARM_COUNT  = isMobile ? 15 : 50;
    const IDLE_TRIGGER = isMobile ? 60  : 150;   // ticks @ ~50 ms each

    let mx = window.innerWidth  / 2;
    let my = window.innerHeight / 2;
    let ambIdleTimer = 0, ambLastMx = -999, ambLastMy = -999;
    let swarmActive  = false, swarmBflies = [];
    let lastTouchTime = Date.now();

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    document.addEventListener('touchstart', e => {
      lastTouchTime = Date.now();
      if (e.touches[0]) { mx = e.touches[0].clientX; my = e.touches[0].clientY; }
      if (swarmActive) { swarmActive = false; dismissSwarm(); ambIdleTimer = 0; }
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      lastTouchTime = Date.now();
      if (e.touches[0]) { mx = e.touches[0].clientX; my = e.touches[0].clientY; }
    }, { passive: true });

    const colorSets = [
      ['#00ff88','#ffd166','#00d4ff','#ff9d6c'],
      ['#ffd166','#ff9d6c','#ffd166','#ff4d6d'],
      ['#00d4ff','#00ff88','#00d4ff','#00ff88'],
      ['#ff9d6c','#ffd166','#ff9d6c','#00d4ff'],
      ['#c084fc','#818cf8','#c084fc','#00d4ff'],
      ['#00ff88','#39c6d6','#a7ffee','#54b8aa'],
    ];

    function makeBfly(size, colors) {
      const [c1,c2,c3,c4] = colors;
      const d1 = (180+Math.random()*100|0), d2 = (180+Math.random()*100|0);
      const div = document.createElement('div');
      div.className = 'amb-butterfly';
      div.style.width = div.style.height = size + 'px';
      div.innerHTML = `<svg viewBox="0 0 100 80" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
        <g style="transform-origin:right center;animation:flapL 0.${d1}s ease-in-out infinite alternate">
          <path d="M50,38 C42,20 18,8 8,18 C-2,28 10,52 28,52 C38,52 46,46 50,38Z" fill="${c1}" opacity=".92"/>
          <path d="M50,42 C44,52 24,62 16,56 C8,50 18,36 32,38 C40,39 46,40 50,42Z" fill="${c2}" opacity=".85"/>
        </g>
        <g style="transform-origin:left center;animation:flapR 0.${d2}s ease-in-out infinite alternate">
          <path d="M50,38 C58,20 82,8 92,18 C102,28 90,52 72,52 C62,52 54,46 50,38Z" fill="${c3}" opacity=".92"/>
          <path d="M50,42 C56,52 76,62 84,56 C92,50 82,36 68,38 C60,39 54,40 50,42Z" fill="${c4}" opacity=".85"/>
        </g>
        <ellipse cx="50" cy="42" rx="2.5" ry="12" fill="#00ff88" opacity=".9"/>
        <circle cx="50" cy="28" r="3" fill="#00ff88"/>
      </svg>`;
      return div;
    }

    function spawnSwarm() {
      swarmBflies = [];
      for (let i = 0; i < SWARM_COUNT; i++) {
        const size   = (isMobile ? 16 : 24) + Math.random() * (isMobile ? 18 : 26);
        const colors = colorSets[Math.random() * colorSets.length | 0];
        const el     = makeBfly(size, colors);
        document.body.appendChild(el);

        const edge = Math.random() * 4 | 0;
        let sx, sy;
        if      (edge === 0) { sx = Math.random()*innerWidth;  sy = -60; }
        else if (edge === 1) { sx = innerWidth+60;             sy = Math.random()*innerHeight; }
        else if (edge === 2) { sx = Math.random()*innerWidth;  sy = innerHeight+60; }
        else                 { sx = -60;                       sy = Math.random()*innerHeight; }

        el.style.left = sx+'px'; el.style.top = sy+'px';
        const b = {
          el, x:sx, y:sy, vx:(Math.random()-.5)*1.8, vy:(Math.random()-.5)*1.8,
          wx:Math.random()*innerWidth, wy:Math.random()*innerHeight,
          wanderTimer:Math.random()*120|0, speed:.6+Math.random()*.9,
          wobble:Math.random()*Math.PI*2, wobbleSpeed:.02+Math.random()*.03,
        };
        swarmBflies.push(b);
        setTimeout(() => el.style.opacity = '1', i * 55);
      }
    }

    function dismissSwarm() {
      const fleeing = [...swarmBflies]; swarmBflies = [];
      fleeing.forEach((b, i) => {
        setTimeout(() => {
          const edge = Math.random()*4|0;
          if      (edge===0){ b.ex=Math.random()*innerWidth; b.ey=-160; }
          else if (edge===1){ b.ex=innerWidth+160;           b.ey=Math.random()*innerHeight; }
          else if (edge===2){ b.ex=Math.random()*innerWidth; b.ey=innerHeight+160; }
          else              { b.ex=-160;                     b.ey=Math.random()*innerHeight; }
          const dx=b.ex-b.x, dy=b.ey-b.y, d=Math.sqrt(dx*dx+dy*dy)||1;
          b.vx=(dx/d)*4; b.vy=(dy/d)*4;
          function fly() {
            const ddx=b.ex-b.x, ddy=b.ey-b.y, dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
            b.vx+=(ddx/dd)*.5; b.vy+=(ddy/dd)*.5;
            const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
            if(spd>14){ b.vx=b.vx/spd*14; b.vy=b.vy/spd*14; }
            b.x+=b.vx; b.y+=b.vy;
            b.el.style.left=b.x+'px'; b.el.style.top=b.y+'px';
            const ang=Math.atan2(b.vy,b.vx)*180/Math.PI;
            b.el.style.transform=`translate(-50%,-50%) rotate(${(ang*.4).toFixed(1)}deg)`;
            if(b.x<-170||b.x>innerWidth+170||b.y<-170||b.y>innerHeight+170){ b.el.remove(); }
            else requestAnimationFrame(fly);
          }
          requestAnimationFrame(fly);
        }, i*35);
      });
    }

    function animateSwarm() {
      if (!swarmActive) return;
      swarmBflies.forEach(b => {
        b.wobble += b.wobbleSpeed; b.wanderTimer++;
        if (b.wanderTimer > 80+Math.random()*60) {
          b.wanderTimer = 0;
          b.wx = 80+Math.random()*(innerWidth-160);
          b.wy = 80+Math.random()*(innerHeight-160);
        }
        const dx=b.wx-b.x, dy=b.wy-b.y, dist=Math.sqrt(dx*dx+dy*dy)||1;
        b.vx += (dx/dist)*b.speed*.08 + Math.sin(b.wobble)*.15;
        b.vy += (dy/dist)*b.speed*.08 + Math.cos(b.wobble*.7)*.15;
        b.vx *= .94; b.vy *= .94;
        b.x += b.vx; b.y += b.vy;
        b.el.style.left = b.x+'px'; b.el.style.top = b.y+'px';
        const ang = Math.atan2(b.vy,b.vx)*180/Math.PI;
        b.el.style.transform = `translate(-50%,-50%) rotate(${(ang*.3).toFixed(1)}deg)`;
      });
      requestAnimationFrame(animateSwarm);
    }

    /* idle-detection ticker */
    setInterval(() => {
      if (isMobile) {
        if (Date.now()-lastTouchTime > IDLE_TRIGGER*50 && !swarmActive) {
          swarmActive = true; spawnSwarm(); requestAnimationFrame(animateSwarm);
        }
      } else {
        const moved = Math.abs(mx-ambLastMx)+Math.abs(my-ambLastMy);
        ambLastMx = mx; ambLastMy = my;
        if (moved < 2) {
          if (++ambIdleTimer >= IDLE_TRIGGER && !swarmActive) {
            swarmActive = true; spawnSwarm(); requestAnimationFrame(animateSwarm);
          }
        } else {
          ambIdleTimer = 0;
          if (swarmActive) { swarmActive = false; dismissSwarm(); }
        }
      }
    }, 50);
  </script>
