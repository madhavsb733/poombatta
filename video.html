<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Videos – കണ്ണേട്ടൻ്റെ ശാഖ</title>
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Bebas+Neue&family=Hind+Madurai:wght@300;400;500;600&family=Caveat:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#080300;color:#ffe8cc;font-family:'Hind Madurai',sans-serif;min-height:100vh;cursor:none;overflow-x:hidden;}

.cur{position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:screen;top:0;left:0}
#c1{width:10px;height:10px;background:#ff7a28;border-radius:50%;transform:translate(-50%,-50%)}
#c2{width:38px;height:38px;border:1.5px solid rgba(255,107,26,.5);border-radius:50%;transform:translate(-50%,-50%);transition:width .22s,height .22s}

#cv{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.vig{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 35%,rgba(5,1,0,.88) 100%),linear-gradient(to top,rgba(8,2,0,.9) 0%,transparent 30%);}

.nav-back{position:fixed;top:1.8rem;left:2rem;z-index:50;font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.2em;color:rgba(255,140,40,.5);text-decoration:none;display:flex;align-items:center;gap:.5rem;transition:color .2s;cursor:none;}
.nav-back:hover{color:rgba(255,140,40,.9)}
.nav-back::before{content:'←'}

.page{position:relative;z-index:2;padding:5rem 2rem 6rem;max-width:1200px;margin:0 auto;}

.hdr{text-align:center;margin-bottom:3rem;}
.hdr-eyebrow{font-family:'Bebas Neue',sans-serif;font-size:.75rem;letter-spacing:.6em;color:rgba(255,140,40,.5);text-transform:uppercase;margin-bottom:.7rem;}
.hdr-title{font-family:'Yatra One',cursive;font-size:clamp(2.5rem,7vw,5.5rem);line-height:1;background:linear-gradient(135deg,#ff6b1a,#ffcc55,#ff4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(255,107,26,.4));}
.hdr-line{width:0;height:2px;margin:.9rem auto;background:linear-gradient(90deg,transparent,#ff6b1a 40%,#ffcc55 60%,transparent);border-radius:2px;animation:grow 1.2s .3s ease forwards;}
@keyframes grow{to{width:min(280px,55%)}}
.hdr-count{font-family:'Bebas Neue',sans-serif;font-size:.7rem;letter-spacing:.3em;color:rgba(255,140,40,.35);margin-top:.6rem;}

.loading{text-align:center;padding:4rem 0;font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.4em;color:rgba(255,140,40,.4);}
.loading-dots::after{content:'...';animation:dots 1.2s steps(4,end) infinite;}
@keyframes dots{0%,100%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
.error-msg{text-align:center;padding:3rem;font-family:'Caveat',cursive;font-size:1.1rem;color:rgba(255,100,50,.6);display:none;}

/* ── MASONRY GRID ── */
.video-grid{
  columns: 3;
  column-gap: 1.4rem;
}
@media(max-width:900px){ .video-grid{ columns: 2; } }
@media(max-width:540px){ .video-grid{ columns: 1; } }

/* ── VIDEO CARD ── */
.video-card{
  position:relative;
  cursor:none;
  border-radius:8px;
  overflow:hidden;
  background:#0d0300;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s;
  box-shadow:0 4px 24px rgba(0,0,0,.5);
  break-inside: avoid;
  margin-bottom: 1.4rem;
  display: inline-block;
  width: 100%;
}
.video-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 24px 70px rgba(255,50,0,.25),0 0 0 1px rgba(255,107,26,.3);}

/* ── THUMBNAIL — no fixed aspect-ratio here; set per-card inline ── */
.video-thumb{
  width:100%;
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,#1e0700,#0d0300);
}
.video-thumb img.thumb{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  filter:brightness(.75) saturate(1.1);
  transition:filter .4s,transform .5s;
}
.video-card:hover .video-thumb img.thumb{filter:brightness(.9) saturate(1.3);transform:scale(1.06);}

.thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.thumb-placeholder svg{opacity:.15;}
.video-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(8,2,0,.85) 0%,rgba(8,2,0,.1) 50%,transparent 100%);z-index:1;}

.video-card::before{content:'';position:absolute;inset:0;border-radius:8px;z-index:0;background:linear-gradient(135deg,rgba(255,80,0,.0),rgba(255,140,20,.0));transition:background .4s;pointer-events:none;}
.video-card:hover::before{background:linear-gradient(135deg,rgba(255,80,0,.08),rgba(255,140,20,.05));}

.play-btn{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;}
.play-ring{width:62px;height:62px;border-radius:50%;background:rgba(0,0,0,.45);border:2px solid rgba(255,200,100,.5);display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(.34,1.56,.64,1),border-color .3s,box-shadow .3s,background .3s;}
.video-card:hover .play-ring{transform:scale(1.18);border-color:#ffcc55;background:rgba(255,80,10,.3);box-shadow:0 0 0 10px rgba(255,107,26,.1),0 0 40px rgba(255,80,10,.25);}
.play-triangle{width:0;height:0;border-top:11px solid transparent;border-bottom:11px solid transparent;border-left:20px solid rgba(255,210,130,.9);margin-left:5px;filter:drop-shadow(0 0 6px rgba(255,180,50,.6));transition:border-left-color .3s,filter .3s;}
.video-card:hover .play-triangle{border-left-color:#ffdd77;filter:drop-shadow(0 0 12px rgba(255,200,60,.9));}

.v-number{position:absolute;top:10px;left:12px;z-index:4;font-family:'Bebas Neue',sans-serif;font-size:.7rem;letter-spacing:.18em;color:rgba(255,200,100,.6);background:rgba(0,0,0,.55);border:1px solid rgba(255,107,26,.2);padding:.15rem .55rem;border-radius:3px;}

.video-info{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:.75rem 1rem .85rem;}
.video-title{font-family:'Hind Madurai',sans-serif;font-weight:600;font-size:.9rem;color:rgba(255,235,195,.92);line-height:1.35;margin-bottom:.2rem;text-shadow:0 1px 8px rgba(0,0,0,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.video-meta{font-family:'Bebas Neue',sans-serif;font-size:.65rem;letter-spacing:.18em;color:rgba(255,140,40,.55);}

.video-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;z-index:5;background:linear-gradient(90deg,transparent,#ff6b1a 30%,#ffcc55 70%,transparent);transform:scaleX(0);transform-origin:left;transition:transform .4s ease;}
.video-card:hover::after{transform:scaleX(1);}

/* ── MODAL ── */
.vid-modal{position:fixed;inset:0;z-index:200;background:rgba(3,1,0,.97);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s;padding:2rem;}
.vid-modal.open{opacity:1;pointer-events:all;}
.vid-wrap{position:relative;max-width:960px;width:100%;}
.vid-close{position:absolute;top:-14px;right:-14px;width:34px;height:34px;border-radius:50%;background:rgba(255,60,0,.25);border:1px solid rgba(255,107,26,.3);color:rgba(255,220,170,.8);font-size:1rem;line-height:34px;text-align:center;cursor:none;transition:background .2s,transform .2s;z-index:5;}
.vid-close:hover{background:rgba(255,60,0,.5);transform:rotate(90deg);}
.vid-frame{width:100%;aspect-ratio:16/9;border-radius:6px;border:none;background:#000;display:block;box-shadow:0 40px 100px rgba(0,0,0,.95);}
.vid-title-bar{font-family:'Caveat',cursive;font-weight:600;font-size:1.1rem;color:rgba(255,220,160,.6);text-align:center;margin-top:1rem;}
</style>
</head>
<body>

<div class="cur" id="c1"></div>
<div class="cur" id="c2"></div>
<canvas id="cv"></canvas>
<div class="vig"></div>
<a class="nav-back" href="memories.html">← Back</a>

<div class="page">
  <div class="hdr">
    <p class="hdr-eyebrow">കണ്ണേട്ടൻ്റെ ശാഖ &nbsp;·&nbsp; 2023 – 2026</p>
    <h1 class="hdr-title">Videos</h1>
    <div class="hdr-line"></div>
    <p class="hdr-count" id="video-count"></p>
  </div>
  <div class="loading" id="loading"><span class="loading-dots">Loading videos</span></div>
  <div class="error-msg" id="error-msg">Could not load videos. Check API key &amp; folder permissions.</div>
  <div class="video-grid" id="video-grid"></div>
</div>

<div class="vid-modal" id="vid-modal" onclick="closeModal(event)">
  <div class="vid-wrap">
    <div class="vid-close" onclick="closeModal({force:true})">✕</div>
    <iframe class="vid-frame" id="vid-frame" src="" allowfullscreen allow="autoplay"></iframe>
    <div class="vid-title-bar" id="vid-title-bar"></div>
  </div>
</div>

<script>
const FOLDER_ID = "10uWhhABB-078f-daxfwryO25DJ0XqK5K";
const API_KEY   = "AIzaSyDY-ZagrKa0T7BLEAwj8PCeTg1quep1AXY";

// Orientation pattern: mix of portrait (3/4) and landscape (16/9)
// Feels organic — never two portraits or two landscapes in a row in same column
const ORIENTATIONS = ['16/9','3/4','16/9','16/9','3/4','3/4','16/9','3/4','16/9','3/4','16/9','16/9'];

async function fetchVideos() {
  const url = `https://www.googleapis.com/drive/v3/files`
    + `?q=%2710uWhhABB-078f-daxfwryO25DJ0XqK5K%27+in+parents+and+mimeType+contains+%27video%2F%27+and+trashed%3Dfalse`
    + `&fields=files(id,name,thumbnailLink,createdTime)`
    + `&orderBy=name`
    + `&pageSize=200`
    + `&key=${API_KEY}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.files || [];
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildGrid(files) {
  const videos = shuffle(files);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('video-count').textContent = videos.length + ' videos';
  const vGrid = document.getElementById('video-grid');

  videos.forEach((v, i) => {
    const title     = v.name.replace(/\.[^/.]+$/, '');
    const thumbSrc  = v.thumbnailLink ? v.thumbnailLink.replace('=s220', '=s640') : null;
    const date      = v.createdTime
      ? new Date(v.createdTime).toLocaleDateString('en-IN', {month:'short', year:'numeric'})
      : 'കണ്ണേട്ടൻ്റെ ശാഖ';

    // Pick aspect ratio from repeating pattern
    const aspectRatio = ORIENTATIONS[i % ORIENTATIONS.length];

    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="video-thumb" style="aspect-ratio:${aspectRatio}">
        ${thumbSrc
          ? `<img class="thumb" src="${thumbSrc}" alt="${title}" loading="lazy"/>`
          : `<div class="thumb-placeholder">
               <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ff6b1a" stroke-width="1.5">
                 <polygon points="5 3 19 12 5 21 5 3"/>
               </svg>
             </div>`
        }
        <div class="play-btn">
          <div class="play-ring"><div class="play-triangle"></div></div>
        </div>
        <div class="v-number">${String(i+1).padStart(2,'0')}</div>
        <div class="video-info">
          <div class="video-title">${title}</div>
          <div class="video-meta">${date}</div>
        </div>
      </div>`;

    card.addEventListener('click', () => openVideo(v.id, title, date));
    card.addEventListener('mouseenter', () => { c2.style.width='52px'; c2.style.height='52px'; });
    card.addEventListener('mouseleave', () => { c2.style.width='38px'; c2.style.height='38px'; });
    vGrid.appendChild(card);
  });
}

function openVideo(fileId, title, date) {
  document.getElementById('vid-frame').src = `https://drive.google.com/file/d/${fileId}/preview`;
  document.getElementById('vid-title-bar').textContent = title + '  ·  ' + date;
  document.getElementById('vid-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && !e.force && e.target !== document.getElementById('vid-modal') && !e.target.classList.contains('vid-close')) return;
  document.getElementById('vid-frame').src = '';
  document.getElementById('vid-modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({force:true}); });

fetchVideos()
  .then(files => {
    if (!files.length) throw new Error('No files');
    buildGrid(files);
  })
  .catch(err => {
    console.error(err);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Error: ' + err.message;
  });

/* ── Custom cursor ── */
const c1=document.getElementById('c1'), c2=document.getElementById('c2');
let mx=innerWidth/2, my=innerHeight/2, rx=mx, ry=my;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
(function tick(){ c1.style.left=mx+'px'; c1.style.top=my+'px'; rx+=(mx-rx)*.12; ry+=(my-ry)*.12; c2.style.left=rx+'px'; c2.style.top=ry+'px'; requestAnimationFrame(tick); })();

/* ── Ember particles ── */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W, H;
const rsz = () => { W=cv.width=innerWidth; H=cv.height=innerHeight; };
rsz(); addEventListener('resize', rsz);
class Em {
  init(){this.x=Math.random()*W;this.y=H+6;this.vx=(Math.random()-.5)*.7;this.vy=-(0.6+Math.random()*1.8);this.r=.5+Math.random()*1.4;this.life=1;this.decay=.0007+Math.random()*.001;this.hue=18+Math.random()*28;this.w=Math.random()*6.28;this.ws=.02+Math.random()*.03;}
  constructor(){this.init();this.y=Math.random()*H;}
  step(){this.w+=this.ws;this.x+=this.vx+Math.sin(this.w)*.28;this.y+=this.vy;this.life-=this.decay;if(this.life<0)this.init();}
  draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,6.28);ctx.fillStyle=`hsla(${this.hue},100%,65%,${this.life*.35})`;ctx.fill();}
}
const embers = Array.from({length:70}, () => new Em());
(function loop(){ ctx.clearRect(0,0,W,H); const g=ctx.createLinearGradient(0,H*.65,0,H); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(18,4,0,.45)'); ctx.fillStyle=g; ctx.fillRect(0,H*.65,W,H*.35); embers.forEach(e=>{e.step();e.draw();}); requestAnimationFrame(loop); })();
</script>
</body>
</html>
